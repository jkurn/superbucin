<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>SUPERBUCIN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }

    /* UI Overlay */
    #ui-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10;
    }
    #ui-overlay > * { pointer-events: auto; }

    /* Loading Screen */
    #loading-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    #loading-screen h1 {
      font-size: 3rem;
      color: #ff6b9d;
      text-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
      margin-bottom: 1rem;
      letter-spacing: 0.2em;
    }
    #loading-screen p {
      color: #e0e0e0;
      font-size: 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Lobby UI — scrollable so all game cards reach small viewports */
    .lobby-ui {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      padding-bottom: max(2rem, env(safe-area-inset-bottom, 0px));
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      touch-action: pan-y;
    }
    .lobby-title {
      font-size: 2.5rem;
      font-weight: 900;
      color: #ff6b9d;
      text-shadow: 0 0 20px rgba(255, 107, 157, 0.4);
      margin-bottom: 0.5rem;
      letter-spacing: 0.15em;
    }
    .lobby-subtitle {
      color: #a0a0c0;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    /* Room UI */
    .room-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 320px;
    }
    .btn {
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      width: 100%;
      max-width: 280px;
      letter-spacing: 0.05em;
    }
    .btn:active { transform: scale(0.95); }
    .btn-pink {
      background: linear-gradient(135deg, #ff6b9d, #ff4081);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
    }
    .btn-blue {
      background: linear-gradient(135deg, #6bc5ff, #4081ff);
      color: white;
      box-shadow: 0 4px 15px rgba(107, 197, 255, 0.4);
    }
    .btn-small {
      padding: 0.6rem 1.5rem;
      font-size: 0.85rem;
      max-width: 200px;
    }
    .room-code-input {
      padding: 0.85rem 1.5rem;
      border: 2px solid #ff6b9d;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: 0.3em;
      width: 100%;
      max-width: 280px;
      outline: none;
      text-transform: uppercase;
    }
    .room-code-input::placeholder {
      color: #666;
      letter-spacing: 0.15em;
      font-size: 0.9rem;
    }
    .room-code-display {
      font-size: 2rem;
      font-weight: 900;
      color: #6bc5ff;
      letter-spacing: 0.3em;
      text-shadow: 0 0 15px rgba(107, 197, 255, 0.5);
    }
    .waiting-text {
      color: #a0a0c0;
      font-size: 0.9rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    /* Share Link */
    .share-link-section {
      margin: 0.75rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .share-link-input {
      width: 100%;
      max-width: 320px;
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #b8b8d0;
      font-size: 0.8rem;
      text-align: center;
      cursor: pointer;
    }
    .share-link-input:focus {
      outline: none;
      border-color: #ff6b9d;
    }
    .share-link-feedback {
      color: #ff6b9d;
      font-size: 0.85rem;
      min-height: 1.2rem;
    }

    .or-divider {
      color: #555;
      font-size: 0.85rem;
      margin: 0.25rem 0;
    }

    /* Game Cards */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      width: 100%;
      max-width: 320px;
      margin-top: 1rem;
    }
    .game-card {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 1.25rem 0.75rem;
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.3s, box-shadow 0.3s;
    }
    .game-card:active { transform: scale(0.95); }
    .game-card.active {
      border-color: #ff6b9d;
      box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
    }
    .game-card.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .game-card-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .game-card-title { color: white; font-weight: 700; font-size: 0.85rem; }
    .game-card-badge {
      display: inline-block;
      background: rgba(255, 107, 157, 0.2);
      color: #ff6b9d;
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 8px;
      margin-top: 0.4rem;
      font-weight: 600;
    }

    /* Side Selection */
    .side-select {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .side-select h2 {
      color: white;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .sides-row {
      display: flex;
      gap: 1.5rem;
    }
    .side-option {
      width: 130px;
      height: 150px;
      background: rgba(255, 255, 255, 0.05);
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.3s, box-shadow 0.3s;
    }
    .side-option:active { transform: scale(0.95); }
    .side-option.selected {
      border-color: #ff6b9d;
      box-shadow: 0 0 25px rgba(255, 107, 157, 0.3);
    }
    .side-option.suggested {
      border-color: rgba(107, 255, 157, 0.6);
      box-shadow: 0 0 20px rgba(107, 255, 157, 0.3);
      animation: suggestPulse 1.2s ease-in-out infinite;
    }
    @keyframes suggestPulse {
      0%, 100% { box-shadow: 0 0 15px rgba(107, 255, 157, 0.2); }
      50% { box-shadow: 0 0 25px rgba(107, 255, 157, 0.5); }
    }
    .side-option .emoji { font-size: 3.5rem; }
    .side-option .label { color: white; font-weight: 700; margin-top: 0.5rem; font-size: 1rem; }

    /* HP Bars — Top (opponent) and Bottom (me) */
    .hp-bar-top, .hp-bar-bottom {
      position: absolute;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      padding: 0.5rem 0.75rem;
      gap: 0.5rem;
      z-index: 20;
    }
    .hp-bar-top {
      top: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    }
    .hp-bar-bottom {
      bottom: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    }
    .hp-avatar {
      font-size: 2rem;
      width: 44px;
      height: 44px;
      background: rgba(0,0,0,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    .hp-bar-wrapper {
      flex: 1;
      position: relative;
    }
    .hp-bar-bg {
      width: 100%;
      height: 20px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.15);
    }
    .hp-bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.3s ease;
    }
    .hp-fill-opponent {
      background: linear-gradient(90deg, #ff4060, #ff6b9d);
    }
    .hp-fill-me {
      background: linear-gradient(90deg, #40cc60, #6bff9d);
    }
    .hp-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-weight: 900;
      font-size: 0.85rem;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    /* Left-side Spawn Panel (like Sheep Fight) */
    .spawn-panel {
      position: absolute;
      left: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      z-index: 20;
    }
    .spawn-btn-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(139, 105, 20, 0.85);
      border: 3px solid rgba(180, 140, 40, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: relative;
    }
    .spawn-btn-circle:active { transform: scale(0.88); }
    .spawn-btn-circle.disabled { opacity: 0.35; }
    .spawn-btn-circle.selected {
      border-color: #ff6b9d;
      box-shadow: 0 0 12px rgba(255, 107, 157, 0.6);
      transform: scale(1.08);
    }
    .spawn-circle-icon { font-size: 1.6rem; margin-top: -2px; }
    .spawn-circle-power {
      position: absolute;
      top: -4px;
      left: -4px;
      background: #ff4060;
      color: white;
      font-size: 0.55rem;
      font-weight: 900;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #cc2040;
    }
    .spawn-circle-cost {
      position: absolute;
      bottom: -4px;
      right: -4px;
      background: #ffd700;
      color: #333;
      font-size: 0.6rem;
      font-weight: 900;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #b8960a;
    }

    /* Energy/Coins Display */
    .energy-display {
      position: absolute;
      left: 0.5rem;
      bottom: 60px;
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      padding: 0.3rem 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      z-index: 20;
    }
    .energy-coin { font-size: 1rem; }
    #energy-value {
      color: #ffd700;
      font-weight: 900;
      font-size: 1rem;
    }

    /* Countdown Overlay */
    .countdown-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      z-index: 50;
    }
    .countdown-number {
      font-size: 8rem;
      font-weight: 900;
      color: #ff6b9d;
      text-shadow: 0 0 40px rgba(255, 107, 157, 0.6);
      animation: countPop 0.5s ease-out;
    }
    .countdown-text {
      font-size: 2.5rem;
      font-weight: 900;
      color: #ff6b9d;
      text-shadow: 0 0 40px rgba(255, 107, 157, 0.6);
      animation: countPop 0.5s ease-out;
    }
    @keyframes countPop {
      0% { transform: scale(2); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Victory Screen */
    .victory-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 50;
    }
    .victory-text {
      font-size: 2rem;
      font-weight: 900;
      color: #ff6b9d;
      text-shadow: 0 0 30px rgba(255, 107, 157, 0.6);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .victory-sub {
      font-size: 1.2rem;
      color: #a0a0c0;
      margin-bottom: 0.75rem;
    }
    .victory-score {
      font-size: 2.2rem;
      font-weight: 900;
      color: white;
      margin-bottom: 2rem;
      letter-spacing: 0.1em;
    }

    /* Reconnecting overlay */
    .reconnect-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      animation: fadeIn 0.3s ease;
    }
    .reconnect-text {
      font-size: 1.8rem;
      color: #ffb347;
      font-weight: bold;
      text-shadow: 0 0 15px rgba(255, 179, 71, 0.5);
    }
    .reconnect-sub {
      font-size: 1.1rem;
      color: #a0a0c0;
      margin-top: 0.5rem;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Mobile Responsive ── */
    @media (max-width: 430px) {
      .lobby-title { font-size: 1.8rem; }
      .lobby-subtitle { font-size: 0.8rem; margin-bottom: 1.2rem; }
      .lobby-ui { padding: 1.5rem 0.75rem; }
      .room-section { max-width: 280px; }
      .btn { padding: 0.7rem 1.5rem; font-size: 0.9rem; max-width: 240px; }
      .room-code-input { max-width: 240px; font-size: 1rem; padding: 0.7rem 1rem; }
      .room-code-display { font-size: 1.6rem; }
      .game-grid { max-width: 280px; gap: 0.75rem; }
      .game-card { padding: 1rem 0.5rem; border-radius: 16px; }
      .game-card-icon { font-size: 2rem; }
      .game-card-title { font-size: 0.8rem; }
      .sides-row { gap: 1rem; }
      .side-option { width: 110px; height: 130px; border-radius: 20px; }
      .side-option .emoji { font-size: 2.8rem; }
      .side-option .label { font-size: 0.9rem; }
      .spawn-btn-circle { width: 50px; height: 50px; }
      .spawn-circle-icon { font-size: 1.3rem; }
      .spawn-circle-cost { width: 18px; height: 18px; font-size: 0.5rem; }
      .spawn-circle-power { width: 17px; height: 17px; font-size: 0.5rem; }
      .spawn-panel { left: 0.3rem; gap: 0.4rem; }
      .hp-avatar { width: 36px; height: 36px; font-size: 1.5rem; }
      .hp-bar-bg { height: 16px; }
      .hp-text { font-size: 0.75rem; }
      .energy-display { bottom: 50px; padding: 0.2rem 0.5rem; }
      .countdown-number { font-size: 5rem; }
      .victory-text { font-size: 1.5rem; }
      .victory-sub { font-size: 1rem; }
      .user-bar-avatar { width: 30px; height: 30px; }
      .user-bar-name { font-size: 0.72rem; }
      .user-bar-btn { font-size: 0.65rem; padding: 0.3rem 0.6rem; }
      .avatar-picker-grid { grid-template-columns: repeat(5, 1fr); }
      .profile-avatar { width: 64px; height: 64px; }
      .stats-summary { gap: 0.5rem; }
      .stat-big { padding: 0.4rem 0.7rem; min-width: 60px; }
      .stat-big-num { font-size: 1.1rem; }
      .victory-avatar { width: 44px; height: 44px; }
      .side-player-avatar { width: 36px; height: 36px; }
    }

    @media (max-width: 360px) {
      .lobby-title { font-size: 1.5rem; }
      .lobby-ui { padding: 1rem 0.5rem; }
      .room-section { max-width: 250px; }
      .btn { padding: 0.6rem 1.2rem; font-size: 0.85rem; max-width: 220px; }
      .room-code-input { max-width: 220px; }
      .game-grid { max-width: 250px; }
      .sides-row { gap: 0.75rem; }
      .side-option { width: 95px; height: 115px; }
      .side-option .emoji { font-size: 2.4rem; }
      .spawn-btn-circle { width: 44px; height: 44px; }
      .spawn-circle-icon { font-size: 1.1rem; }
      .spawn-circle-cost { width: 16px; height: 16px; font-size: 0.45rem; }
      .spawn-circle-power { width: 15px; height: 15px; font-size: 0.4rem; }
      .hp-avatar { width: 30px; height: 30px; font-size: 1.2rem; }
      .hp-bar-bg { height: 14px; }
      .countdown-number { font-size: 4rem; }
    }

    /* Word Scramble Race */
    .wsr-root {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0.75rem 0.35rem;
      overflow: hidden;
      pointer-events: auto;
    }
    .wsr-topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem 0.75rem;
      margin-bottom: 0.35rem;
    }
    .wsr-round {
      color: #e0e0f0;
      font-weight: 800;
      font-size: 0.85rem;
    }
    .wsr-timer {
      font-size: 1.35rem;
      font-weight: 900;
      color: #6bc5ff;
      text-shadow: 0 0 12px rgba(107, 197, 255, 0.35);
      font-variant-numeric: tabular-nums;
    }
    .wsr-phase-msg {
      flex: 1 1 100%;
      text-align: center;
      color: #ffb347;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .wsr-scores {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.4rem;
    }
    .wsr-score-pill {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      background: rgba(0,0,0,0.35);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .wsr-score-pill span {
      font-size: 0.7rem;
      color: #a0a0c0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .wsr-score-pill strong {
      font-size: 1.1rem;
      color: white;
    }
    .wsr-me strong { color: #7dffb3; }
    .wsr-opp strong { color: #ff8ab8; }
    .wsr-main {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 0.5rem;
      min-height: 0;
      align-items: stretch;
    }
    .wsr-grid-wrap {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      max-width: 56%;
    }
    .wsr-grid {
      display: grid;
      gap: 5px;
      width: min(52vw, 260px);
      aspect-ratio: 1;
    }
    .wsr-cell {
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: clamp(0.95rem, 4.2vw, 1.35rem);
      font-weight: 800;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .wsr-cell:active { transform: scale(0.94); }
    .wsr-cell.wsr-path {
      background: rgba(107, 197, 255, 0.35);
      box-shadow: 0 0 0 2px rgba(107, 197, 255, 0.5);
    }
    .wsr-cell.wsr-path-last {
      background: rgba(255, 107, 157, 0.45);
      box-shadow: 0 0 0 2px rgba(255, 107, 157, 0.65);
    }
    .wsr-grid.wsr-dim { opacity: 0.45; pointer-events: none; }
    .wsr-current {
      min-height: 1.5rem;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #ffd86b;
      text-transform: uppercase;
    }
    .wsr-actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .wsr-words-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      gap: 0.35rem;
      overflow: hidden;
    }
    .wsr-words-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      padding: 0.35rem 0.4rem;
      overflow: hidden;
    }

    /* Doodle Guess */

    .game-options-check {

    .doodle-custom-wrap {

      color: #e8e8f0;

      outline: none;
      font-family: inherit;
      -webkit-user-select: text;

    /* Memory Match (lobby + in-game) */
    .memory-pack-select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.3);
      color: #f0f0f8;
      font-size: 0.8rem;
    }
    .memory-hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 25;
      padding: 0.45rem 0.65rem 0.35rem;
      background: linear-gradient(180deg, rgba(15,12,28,0.92) 0%, rgba(15,12,28,0.65) 70%, transparent 100%);
      pointer-events: none;
      text-align: center;
    }
    .memory-hud-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .memory-hud-scores {
      color: #e8e8f8;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .memory-hud-scores strong {
      color: #ff6b9d;
      font-weight: 900;
    }
    .memory-hud-dot { color: #555; margin: 0 0.15rem; }
    .memory-hud-timer {
      color: #6bc5ff;
      font-weight: 800;
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
    }
    .memory-hud-turn {
      font-size: 0.95rem;
      font-weight: 800;
      color: #a8a8d0;
      margin-top: 0.15rem;
    }
    .memory-hud-turn.mem-turn-mine {
      color: #ffd166;
      text-shadow: 0 0 12px rgba(255, 209, 102, 0.35);
    }
    .memory-hud-meta {
      font-size: 0.65rem;
      color: #7a7a9a;
      margin-top: 0.2rem;
      font-weight: 600;
    }
    .memory-match-layer {
      position: absolute;
      inset: 0;
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4.5rem 0.5rem 1rem;
      pointer-events: none;
    }
    .memory-board-wrap {
      width: 100%;
      max-width: min(92vw, 420px);
      max-height: min(72vh, 520px);
      pointer-events: auto;
    }
    .memory-board {
      display: grid;
      gap: clamp(4px, 1.2vw, 10px);
      width: 100%;
      height: 100%;
    }
    .memory-card {
      position: relative;
      aspect-ratio: 1;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      perspective: 600px;
    }
    .memory-card:disabled {
      cursor: default;
      opacity: 1;
    }
    .memory-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: clamp(8px, 2vw, 14px);
    }
    .memory-card-inner.is-revealed {
      transform: rotateY(180deg);
    }
    .memory-card-inner.is-matched .memory-card-face {
      box-shadow: 0 0 0 2px rgba(255, 209, 102, 0.65), 0 4px 20px rgba(255, 107, 157, 0.25);
    }
    .memory-card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: clamp(8px, 2vw, 14px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .memory-card-back {
      background: linear-gradient(145deg, #2d1f3d 0%, #1a1a2e 50%, #16213e 100%);
      border: 2px solid rgba(255, 107, 157, 0.35);
      font-size: clamp(1rem, 4vw, 1.6rem);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.35);
    }
    .memory-card-front {
      background: linear-gradient(160deg, #faf5ff 0%, #e8e0f5 100%);
      transform: rotateY(180deg);
      border: 2px solid rgba(120, 90, 160, 0.25);
      padding: 4px;
    }
    .memory-face {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .memory-face-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }
    .memory-face-emoji {
      font-size: clamp(1.25rem, 7vw, 2.25rem);
      line-height: 1;
    }
    .memory-face-text {
      font-size: clamp(0.55rem, 2.8vw, 0.78rem);
      font-weight: 800;
      color: #2a1f3d;
      line-height: 1.2;
      padding: 0.2rem;
      word-break: break-word;
    }

    .doodle-root {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 0.4rem 0.6rem 0.5rem;
      overflow: hidden;
      pointer-events: auto;
      gap: 0.35rem;
    }
    .doodle-topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.25rem 0.75rem;
    }
    .doodle-scores {
      font-weight: 900;
      font-size: 1.1rem;
      color: #ff6b9d;
      font-variant-numeric: tabular-nums;
    }
    .doodle-round {
      color: #a0a0c0;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .doodle-timer {
      font-size: 1.25rem;
      font-weight: 900;
      color: #6bc5ff;
      font-variant-numeric: tabular-nums;
    }
    .doodle-role {
      text-align: center;
      font-weight: 800;
      font-size: 0.8rem;
      color: #ffd86b;
    }
    .doodle-prompt-box {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: center;
      gap: 0.35rem 0.5rem;
      background: rgba(255, 107, 157, 0.12);
      border: 1px solid rgba(255, 107, 157, 0.25);
      border-radius: 12px;
      padding: 0.4rem 0.65rem;
    }
    .doodle-prompt-label {
      color: #a0a0c0;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .doodle-prompt-text {
      color: white;
      font-weight: 800;
      font-size: 0.95rem;
    }
    .doodle-canvas-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.2);
    }
    .doodle-canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      touch-action: none;
    }
    .doodle-hint {
      text-align: center;
      font-size: 0.72rem;
      color: #8888aa;
      line-height: 1.3;
    }
    .doodle-drawer-tools {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .doodle-colors {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .doodle-color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .doodle-color-swatch.active {
      border-color: #ff6b9d;
      box-shadow: 0 0 0 2px rgba(255, 107, 157, 0.4);
    }
    .doodle-guess-row {
      display: flex;
      gap: 0.4rem;
      align-items: stretch;
    }
    .doodle-guess-input {
      flex: 1;
      min-width: 0;
      padding: 0.55rem 0.75rem;
      border-radius: 12px;
      border: 2px solid rgba(107, 197, 255, 0.4);
      background: rgba(0,0,0,0.35);
      color: white;
      font-size: 0.95rem;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
      touch-action: manipulation;
    }
    .doodle-result {
      text-align: center;
      font-weight: 800;
      font-size: 0.85rem;
      padding: 0.45rem 0.5rem;
      border-radius: 12px;
    }
    .doodle-result-ok {
      background: rgba(46, 160, 120, 0.25);
      color: #7dffc8;
      border: 1px solid rgba(100, 220, 180, 0.35);
    }
    .doodle-result-miss {
      background: rgba(200, 80, 100, 0.2);
      color: #ffb3c0;
      border: 1px solid rgba(255, 107, 157, 0.3);
    }
    @keyframes doodleShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .doodle-shake {
      animation: doodleShake 0.35s ease;
    }

    /* ── Speed Match ── */
    .sm-hud {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
      overflow: hidden;
    }
    .sm-top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem 0.3rem;
      background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 100%);
      z-index: 5;
    }
    .sm-score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
    }
    .sm-score-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a0a0c0;
    }
    .sm-score-value {
      font-size: 1.6rem;
      font-weight: 900;
      color: #ffd86b;
      text-shadow: 0 0 12px rgba(255, 216, 107, 0.35);
      font-variant-numeric: tabular-nums;
    }
    .sm-progress {
      font-size: 0.85rem;
      font-weight: 800;
      color: #e0e0f0;
      letter-spacing: 0.05em;
    }
    .sm-timer-bar {
      height: 4px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .sm-timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #6bc5ff, #a06bff);
      border-radius: 0 2px 2px 0;
      transition: width 0.15s linear;
    }
    .sm-timer-fill.sm-timer-danger {
      background: linear-gradient(90deg, #ff4060, #ff6b9d);
    }
    .sm-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem 1.5rem;
      gap: 0.75rem;
      overflow-y: auto;
    }
    .sm-countdown-big {
      text-align: center;
      animation: countPop 0.5s ease-out;
    }
    .sm-countdown-icon {
      font-size: 4rem;
      margin-bottom: 0.5rem;
    }
    .sm-countdown-text {
      font-size: 1.8rem;
      font-weight: 900;
      color: #ff6b9d;
      text-shadow: 0 0 25px rgba(255, 107, 157, 0.5);
    }
    .sm-category {
      font-size: 0.75rem;
      font-weight: 700;
      color: #a0a0c0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .sm-bonus-badge {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a2e;
      font-size: 0.6rem;
      font-weight: 900;
      padding: 0.15rem 0.45rem;
      border-radius: 6px;
      letter-spacing: 0.05em;
    }
    .sm-question {
      font-size: 1.35rem;
      font-weight: 900;
      color: white;
      text-align: center;
      line-height: 1.3;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .sm-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      width: 100%;
      max-width: 340px;
    }
    .sm-option-btn {
      padding: 0.7rem 0.5rem;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
      line-height: 1.25;
    }
    .sm-option-btn:active { transform: scale(0.95); }
    .sm-option-btn.sm-option-selected {
      border-color: #ff6b9d;
      background: rgba(255, 107, 157, 0.2);
      box-shadow: 0 0 15px rgba(255, 107, 157, 0.25);
    }
    .sm-wait-status {
      font-size: 0.8rem;
      font-weight: 600;
      min-height: 1.2rem;
      text-align: center;
    }
    .sm-waiting { color: #a0a0c0; animation: pulse 1.5s ease-in-out infinite; }
    .sm-partner-ready { color: #6bc5ff; }

    /* Reveal phase */
    .sm-reveal-answers {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      max-width: 340px;
    }
    .sm-reveal-card {
      flex: 1;
      text-align: center;
      padding: 0.75rem 0.5rem;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      animation: smRevealSlide 0.4s ease-out;
    }
    @keyframes smRevealSlide {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .sm-reveal-card.sm-match {
      border-color: rgba(107, 255, 180, 0.45);
      background: rgba(107, 255, 180, 0.08);
    }
    .sm-reveal-card.sm-no-match {
      border-color: rgba(255, 107, 157, 0.3);
      background: rgba(255, 107, 157, 0.05);
    }
    .sm-reveal-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #a0a0c0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.35rem;
    }
    .sm-reveal-answer {
      font-size: 0.9rem;
      font-weight: 800;
      color: white;
      line-height: 1.3;
    }
    .sm-reveal-vs {
      font-size: 0.85rem;
      font-weight: 900;
      color: #555;
      flex-shrink: 0;
    }
    .sm-reveal-vs.sm-match {
      color: #6bffb4;
      font-size: 1.5rem;
    }
    .sm-match-result {
      font-size: 1.1rem;
      font-weight: 900;
      text-align: center;
      padding: 0.4rem 0.75rem;
      border-radius: 12px;
      animation: countPop 0.4s ease-out;
    }
    .sm-match-result.sm-match {
      color: #6bffb4;
      background: rgba(107, 255, 180, 0.1);
      text-shadow: 0 0 15px rgba(107, 255, 180, 0.4);
    }
    .sm-match-result.sm-no-match {
      color: #ff8ab8;
      background: rgba(255, 107, 157, 0.08);
    }

    @media (max-width: 430px) {
      .sm-question { font-size: 1.1rem; }
      .sm-options { max-width: 300px; gap: 0.4rem; }
      .sm-option-btn { padding: 0.6rem 0.4rem; font-size: 0.75rem; }
      .sm-score-value { font-size: 1.3rem; }
      .sm-reveal-answers { max-width: 300px; }
      .sm-reveal-answer { font-size: 0.8rem; }
    }
    @media (max-width: 360px) {
      .sm-question { font-size: 1rem; }
      .sm-options { max-width: 270px; }
      .sm-option-btn { padding: 0.5rem 0.3rem; font-size: 0.7rem; border-radius: 10px; }
      .sm-score-value { font-size: 1.1rem; }
      .sm-top-bar { padding: 0.4rem 0.6rem 0.2rem; }
    }

    /* ── User Bar ── */
    .user-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 0.75rem;

    }

      font-size: 0.65rem;

      font-weight: 700;
      padding: 0.35rem 0.75rem;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .user-bar-btn:active { background: rgba(255, 255, 255, 0.15); }

    /* ── Auth Screen ── */
    .auth-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .auth-tab {
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(255, 255, 255, 0.1);
      color: #a0a0c0;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.5rem 1.25rem;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .auth-tab.active {
      border-color: #ff6b9d;
      color: #ff6b9d;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      width: 100%;
      max-width: 300px;
      align-items: center;
    }
    .auth-form.hidden { display: none; }
    .auth-input {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.25);
      color: white;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
      -webkit-user-select: text;
      user-select: text;
      touch-action: manipulation;
    }
    .auth-input:focus { border-color: rgba(255, 107, 157, 0.5); }
    .auth-input::placeholder { color: #666; }
    .auth-error {
      color: #ff6b9d;
      font-size: 0.78rem;
      min-height: 1.2rem;
      text-align: center;
    }
    .auth-link {
      background: none;
      border: none;
      color: #6bc5ff;
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      padding: 0;
      margin-top: -0.25rem;
    }
    .auth-link:active { opacity: 0.7; }

    /* ── Avatar Picker ── */
    .avatar-picker {
      width: 100%;
    }
    .avatar-picker-label {
      color: #a0a0c0;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .avatar-picker-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
      padding: 4px;
    }
    .avatar-pick-item {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      object-fit: cover;
    }
    .avatar-pick-item:active { transform: scale(0.9); }
    .avatar-pick-item.selected {
      border-color: #ff6b9d;
      box-shadow: 0 0 8px rgba(255, 107, 157, 0.4);
    }

    /* ── Profile Screen ── */
    .profile-layout {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
    }
    .profile-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 1rem;
    }
    .profile-bottom-bar {
      flex-shrink: 0;
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      padding: 0.6rem 1rem max(0.6rem, env(safe-area-inset-bottom, 0.6rem));
      background: rgba(15, 12, 28, 0.98);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #ff6b9d;
      object-fit: cover;
    }
    .profile-name {
      color: white;
      font-size: 1.2rem;
      font-weight: 800;
    }
    .profile-bio {
      color: #a0a0c0;
      font-size: 0.8rem;
      text-align: center;
      max-width: 280px;
    }
    .profile-points {
      color: #ffd700;
      font-size: 0.9rem;
      font-weight: 700;
    }
    .profile-section-tabs {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .profile-tab {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #8888aa;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.35rem 0.75rem;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .profile-tab.active {
      border-color: #ff6b9d;
      color: #ff6b9d;
    }
    .profile-content {
      width: 100%;
      max-width: 360px;
      min-height: 200px;
      padding-bottom: 0.5rem;
    }
    .profile-loading, .profile-empty {
      text-align: center;
      color: #8888aa;
      font-size: 0.85rem;
      padding: 2rem 0;
    }
    .profile-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1rem;
    }

    /* Stats */
    .stats-summary {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .stat-big {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 0.6rem 1rem;
      min-width: 70px;
    }
    .stat-big-num {
      color: #ff6b9d;
      font-size: 1.4rem;
      font-weight: 900;
    }
    .stat-big-label {
      color: #8888aa;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 0.65rem 0.75rem;
    }
    .stat-card-title {
      color: white;
      font-size: 0.75rem;
      font-weight: 800;
      margin-bottom: 0.35rem;
    }
    .stat-card-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #a0a0c0;
      padding: 0.1rem 0;
    }
    .stat-card-row strong { color: white; }

    /* Achievements */
    .achievements-grid {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .achievement-card {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.7rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: opacity 0.2s;
    }
    .achievement-card.locked { opacity: 0.45; }
    .achievement-card.earned { border-color: rgba(255, 209, 102, 0.3); }
    .achievement-icon { font-size: 1.5rem; flex-shrink: 0; }
    .achievement-info { flex: 1; min-width: 0; }
    .achievement-name {
      color: white;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .achievement-desc {
      color: #8888aa;
      font-size: 0.65rem;
    }
    .achievement-check {
      color: #ffd166;
      font-weight: 900;
      font-size: 1rem;
    }

    /* Match History */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.6rem;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .history-game { font-size: 1.1rem; flex-shrink: 0; }
    .history-opp {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      min-width: 0;
      font-size: 0.72rem;
      color: #c8c8e0;
    }
    .history-opp-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .history-opp-avatar-placeholder {
      width: 22px;
      height: 22px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .history-score {
      color: white;
      font-weight: 800;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .history-result {
      font-size: 0.6rem;
      font-weight: 900;
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .history-result.win { background: rgba(40, 180, 80, 0.25); color: #7dffb3; }
    .history-result.loss { background: rgba(255, 80, 100, 0.2); color: #ffb3c0; }
    .history-result.tie { background: rgba(255, 200, 80, 0.2); color: #ffd86b; }
    .history-time {
      color: #666;
      font-size: 0.6rem;
      flex-shrink: 0;
    }

    /* Settings */
    .settings-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .settings-label {
      color: #a0a0c0;
      font-size: 0.72rem;
      font-weight: 700;
      margin-top: 0.25rem;
    }

    /* Achievement Toast */
    .achievement-toast {
      position: fixed;
      top: 4rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: linear-gradient(135deg, rgba(30, 20, 45, 0.97), rgba(50, 30, 60, 0.97));
      border: 2px solid rgba(255, 209, 102, 0.5);
      border-radius: 16px;
      padding: 0.65rem 1.1rem;
      z-index: 300;
      animation: achieveIn 0.4s ease, achieveOut 0.4s ease 3.5s forwards;
      box-shadow: 0 4px 20px rgba(255, 209, 102, 0.2);
    }
    .achievement-toast-icon { font-size: 1.5rem; }
    .achievement-toast-title {
      color: #ffd166;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .achievement-toast-name {
      color: white;
      font-size: 0.9rem;
      font-weight: 800;
    }
    @keyframes achieveIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px) scale(0.9); }
      to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }
    @keyframes achieveOut {
      from { opacity: 1; }
      to { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }

    /* Waiting Room Player Card */
    .waiting-player-card {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 0.5rem 1rem;
      margin: 0.5rem 0;
    }
    .waiting-player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255, 107, 157, 0.3);
      object-fit: cover;
    }
    .waiting-player-name {
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* Side Select Players */
    .side-select-players {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .side-select-player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: #c8c8e0;
      font-weight: 600;
    }
    .side-player-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.15);
      object-fit: cover;
    }
    .side-vs {
      color: #ff6b9d;
      font-weight: 900;
      font-size: 1rem;
    }

    /* Victory Players */
    .victory-players {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .victory-player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: #c8c8e0;
      font-weight: 600;
    }
    .victory-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.15);
      object-fit: cover;
    }
    .victory-vs {
      color: #ff6b9d;
      font-weight: 900;
      font-size: 1rem;
    }
    .victory-points {
      color: #ffd700;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      animation: countPop 0.5s ease-out;
    }

    /* Error toast */
    .error-toast {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 20, 40, 0.95);
      color: #ff6b9d;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 107, 157, 0.3);
      font-size: 0.95rem;
      z-index: 200;
      pointer-events: none;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* Othello HUD */
    .othello-turn-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      text-align: center;
      padding: 0.8rem 1rem;
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #888;
      background: rgba(0,0,0,0.5);
      z-index: 20;
      transition: all 0.4s ease;
    }
    .othello-turn-bar.my-turn {
      color: #fff;
      background: linear-gradient(90deg, rgba(80,200,120,0.8) 0%, rgba(40,160,80,0.8) 100%);
      box-shadow: 0 2px 20px rgba(80,200,120,0.5);
      animation: turnPulse 1.5s ease-in-out infinite;
    }
    .othello-turn-bar.opp-turn {
      color: #999;
      background: rgba(0,0,0,0.5);
    }
    @keyframes turnPulse {
      0%, 100% { box-shadow: 0 2px 20px rgba(80,200,120,0.4); }
      50% { box-shadow: 0 2px 30px rgba(80,200,120,0.7); }
    }

    .othello-score-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.75rem 1rem;
      background: rgba(0,0,0,0.5);
      z-index: 20;
      transition: all 0.4s ease;
    }
    .othello-score-bar.my-turn {
      background: linear-gradient(90deg, rgba(80,200,120,0.6) 0%, rgba(40,160,80,0.6) 100%);
      box-shadow: 0 -2px 20px rgba(80,200,120,0.4);
      animation: turnPulseBottom 1.5s ease-in-out infinite;
    }
    @keyframes turnPulseBottom {
      0%, 100% { box-shadow: 0 -2px 20px rgba(80,200,120,0.3); }
      50% { box-shadow: 0 -2px 30px rgba(80,200,120,0.6); }
    }
    .score-side {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .score-disc { font-size: 1.5rem; }
    .score-value {
      font-size: 1.8rem;
      font-weight: 900;
      color: white;
      transition: transform 0.3s;
    }
    .score-value.score-bump {
      transform: scale(1.3);
    }
    .score-divider {
      color: #555;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading-screen">
      <h1>SUPERBUCIN</h1>
      <p>Loading sayang...</p>
    </div>
    <div id="ui-overlay"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
